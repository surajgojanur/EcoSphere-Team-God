    "/auth/signup": {
      "post": {
        "operationId": "signupEmployee",
        "summary": "Create an EMPLOYEE account. Public callers cannot submit roles, permissions, points, XP, badges, active state, or department scores.",
        "tags": [
          "Authentication"
        ],
        "x-priority": "P0",
        "security": [],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/SignupRequest"
              },
              "examples": {
                "employee": {
                  "value": {
                    "name": "Aditi Rao",
                    "email": "aditi@example.com",
                    "password": "Demo@12345"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Employee account created. Signup does not return a token.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UserEnvelope"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          },
          "409": {
            "$ref": "#/components/responses/EmailAlreadyExists"
          }
        }
      }
    },
